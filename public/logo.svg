<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Left person (blue) -->
  <circle cx="32" cy="18" r="10" fill="#2563EB"/>
  <!-- Right person (dark) -->
  <circle cx="88" cy="18" r="10" fill="#1e293b"/>
  <!-- M shape made of two people leaning in / handshake -->
  <!-- Left arm down-right -->
  <path d="M22 30 Q32 52 60 68 Q88 52 98 30" stroke="#1e293b" stroke-width="0" fill="none"/>
  <!-- Left figure body -->
  <path d="M14 32 C14 32 24 44 60 60" stroke="#2563EB" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right figure body -->
  <path d="M106 32 C106 32 96 44 60 60" stroke="#1e293b" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Left leg down -->
  <path d="M14 32 L22 76" stroke="#2563EB" stroke-width="13" stroke-linecap="round" fill="none"/>
  <!-- Right leg down -->
  <path d="M106 32 L98 76" stroke="#1e293b" stroke-width="13" stroke-linecap="round" fill="none"/>
  <!-- Mic / sound wave in center -->
  <rect x="57" y="62" width="3" height="14" rx="1.5" fill="#2563EB"/>
  <rect x="53" y="66" width="3" height="8" rx="1.5" fill="#2563EB" opacity="0.5"/>
  <rect x="64" y="66" width="3" height="8" rx="1.5" fill="#1e293b" opacity="0.5"/>
</svg>
